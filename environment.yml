# Reproducible Conda env (no machine-specific paths). Usage:
#   conda env create -f environment.yml
#   conda activate labs_py
name: labs_py
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - jupyter
  - ipykernel
  - sqlalchemy
  - python-dotenv
  - numpy
  - pandas
  - matplotlib
  - seaborn
  - pytest
  - pip:
      - psycopg>=3
